<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="css/bootstrap.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        body {
            width: 400px;
            background-color: #121214;

            </div>

            </div>




        </div>

            <div class="row align-items-center">

                </div>
